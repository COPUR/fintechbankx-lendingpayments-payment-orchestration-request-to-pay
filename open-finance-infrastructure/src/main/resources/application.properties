# Application Name
spring.application.name=request-to-pay-service

# Observability - Tracing Configuration
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# Observability - Endpoint Exposure
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# FAPI Security - JWT Validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://issuer.example.com
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://issuer.example.com/jwks
spring.security.oauth2.resourceserver.jwt.expected-issuer=https://issuer.example.com
spring.security.oauth2.resourceserver.jwt.expected-audience=https://api.example.com